apiVersion: app/v1
kind: Deployment
metadata:
  name: flask-app-deployment
  labels:
    app: flask=app
  spec:
    replicas: {{.Values.replicaCount}}
    selector:
      matchLabels:
        app: flask-app
    template:
      metadata:
        labels:
          app: flask-app
      spec:
        containers:
          - name: flask-app
          #The image is pulled from ECR based on the values.yaml
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullePolicy}}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          #Resource limits for cost and performance management
          resource:
            {{- toYaml .Values.resources | nindent 12 }} 
          #Security context: running as non-root
          SecurityContext:
            runAsNonRoot: true
            runAsUser: 1000